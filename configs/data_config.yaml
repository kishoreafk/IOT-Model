preprocessing:
  input_size: 224
  interpolation: "bilinear"
  center_crop: true
  crop_size: 224

normalization:
  mean: [0.485, 0.456, 0.406]
  std:  [0.229, 0.224, 0.225]

augmentation:
  enabled: true
  horizontal_flip: true
  rotation_range: 15
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.1

dataloader:
  batch_size: 32
  num_workers: 4
  pin_memory: true
  drop_last: false
