custom_vit:
  enabled: true
  architecture: "vit_base_patch16_224"
  source: "timm"
  num_classes: 50
  weights_path: "../model/best_vit_model.pth"
  input_size: 224
  patch_size: 16
  normalization:
    mean: [0.485, 0.456, 0.406]
    std:  [0.229, 0.224, 0.225]
  thresholds:
    known: 0.85
    adapt: 0.60

clip:
  enabled: true
  model_name: "openai/clip-vit-base-patch32"
  source: "huggingface"
  embedding_dim: 512

lora:
  enabled: true
  r: 8
  alpha: 16
  target_modules: ["query", "key", "value", "dense"]
  dropout: 0.1
  bias: "none"
  task_type: "IMAGE_CLS"
  num_epochs: 5

hardware:
  device: "auto"
  use_fp16: true
  fp16_min_capability: 7
